spring.application.name=ascenderp

# Set these as environment variables on Render (and keep using the
# original MySQL values in your local .env / IDE run config for
# development — these env vars only take effect if set).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/ascenderp}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Aniruddha}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Render assigns the port dynamically via $PORT; falls back to 8080 locally
server.port=${PORT:8080}
